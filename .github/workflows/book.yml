name: book

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build mdBook
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook
        run: |
          MD_VERSION="0.4.43"
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MD_VERSION}/mdbook-v${MD_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /tmp
          sudo mv /tmp/mdbook /usr/local/bin/
      - name: Build
        run: mdbook build docs/book
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/book

  deploy:
    name: deploy to github pages
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
